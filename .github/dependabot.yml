version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"

    groups:
      github-actions:
        patterns:
          - "*"