version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 3

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore(actions)"