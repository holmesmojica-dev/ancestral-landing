name: Bug Report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the project.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the issue in detail.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide detailed steps to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happens.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, device, etc.
      placeholder: Chrome 137, Windows 11

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Evidence
      description: Add screenshots or additional evidence if available.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any additional context.
